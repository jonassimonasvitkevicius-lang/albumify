<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Albumify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --border:    #1f1f1f;
      --green:     #1db954;
      --green-dim: #145e2e;
      --muted:     #555555;
      --text:      #e0e0e0;
      --text-dim:  #888888;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-weight: 300; min-height: 100vh; }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 0;
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,10,0.96);
      backdrop-filter: blur(10px);
    }
    header .inner { max-width: 1400px; margin: 0 auto; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; font-weight: 500; letter-spacing: 0.05em; color: var(--green); cursor: pointer; }
    .nav-links { display: flex; gap: 28px; font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; letter-spacing: 0.08em; color: var(--muted); align-items: center; }
    .nav-links span { cursor: pointer; transition: color 0.15s; }
    .nav-links span:hover { color: var(--text); }
    .nav-links span.active { color: var(--green); }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ═══════════════════════════════════════════
       HOME — full-width grid, no side padding waste
    ═══════════════════════════════════════════ */
    .home-inner { max-width: 1400px; margin: 0 auto; padding: 36px 28px 80px; }

    .home-header {
      display: flex; align-items: baseline; gap: 14px; margin-bottom: 20px;
    }
    .home-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted);
    }
    .home-source {
      font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: #2d2d2d;
    }

    /* Big square grid — 5 columns on wide, fewer on smaller */
    .album-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }
    @media (max-width: 1200px) { .album-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 900px)  { .album-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 580px)  { .album-grid { grid-template-columns: repeat(2, 1fr); gap: 9px; } }

    .album-card {
      cursor: pointer;
      position: relative;
      background: var(--surface);
      overflow: hidden;
      transition: transform 0.2s ease;
    }
    .album-card:hover { transform: scale(1.025); z-index: 2; }

    /* Full-bleed square art */
    .card-art-wrap {
      position: relative; width: 100%; aspect-ratio: 1; overflow: hidden;
    }
    .card-art-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.35s ease;
    }
    .album-card:hover .card-art-wrap img { transform: scale(1.06); }
    .card-art-placeholder {
      width: 100%; aspect-ratio: 1; background: var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 3rem;
    }

    /* Gradient overlay — always present at low opacity, stronger on hover */
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.15) 45%, transparent 100%);
      opacity: 0.5; transition: opacity 0.25s;
      pointer-events: none;
    }
    .album-card:hover .card-overlay { opacity: 1; }

    /* Save button — hidden until hover */
    .card-save {
      position: absolute; top: 9px; right: 9px;
      background: rgba(0,0,0,0.78); border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem;
      padding: 4px 8px; cursor: pointer; border-radius: 2px; white-space: nowrap;
      opacity: 0; transition: opacity 0.18s, color 0.15s, border-color 0.15s;
    }
    .album-card:hover .card-save { opacity: 1; }
    .card-save:hover { color: var(--green); border-color: var(--green-dim); }
    .card-save.saved { opacity: 1; color: var(--green); border-color: var(--green-dim); background: rgba(0,0,0,0.88); }

    /* Text info below art */
    .card-info { padding: 10px 11px 13px; }
    .card-name {
      font-size: 0.85rem; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;
    }
    .card-artist {
      font-size: 0.72rem; color: var(--text-dim);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
    }
    .card-year { font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; color: var(--muted); }

    /* Skeleton loading */
    .skeleton { background: linear-gradient(90deg, var(--surface) 25%, #181818 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skeleton-art { width: 100%; aspect-ratio: 1; }
    .skeleton-line { height: 11px; margin: 10px 11px 5px; border-radius: 2px; }
    .skeleton-line-sm { height: 9px; margin: 0 11px 13px; width: 55%; border-radius: 2px; }

    /* ═══════════════════════════════════════════
       SEARCH PAGE
    ═══════════════════════════════════════════ */
    .search-inner { max-width: 900px; margin: 0 auto; padding: 40px 28px; }
    .search-row { display: flex; margin-bottom: 32px; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; transition: border-color 0.2s; }
    .search-row:focus-within { border-color: var(--green-dim); }
    .search-input { flex: 1; background: var(--surface); border: none; padding: 12px 16px; color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 0.9rem; font-weight: 300; outline: none; }
    .search-input::placeholder { color: var(--muted); }
    .search-btn { background: var(--green); color: #000; border: none; padding: 12px 20px; font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
    .search-btn:hover { background: #1ed760; }

    /* ═══════════════════════════════════════════
       DISCOVER PAGE
    ═══════════════════════════════════════════ */
    .discover-inner { max-width: 680px; margin: 0 auto; padding: 44px 28px 80px; }
    .discover-heading {
      font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    .discover-desc { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 30px; padding-bottom: 22px; border-bottom: 1px solid var(--border); line-height: 1.6; }

    .genre-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .genre-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; margin-bottom: 22px;
    }
    @media (max-width: 520px) { .genre-grid { grid-template-columns: repeat(3, 1fr); } }
    .genre-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-dim); font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.03em;
      padding: 9px 4px; cursor: pointer; border-radius: 2px; text-align: center;
      transition: all 0.15s;
    }
    .genre-btn:hover { border-color: #333; color: var(--text); }
    .genre-btn.selected { border-color: var(--green); color: var(--green); background: rgba(29,185,84,0.07); }

    .discover-actions { display: flex; gap: 10px; margin-bottom: 32px; }
    .discover-go-btn {
      flex: 1; background: var(--green); color: #000; border: none;
      padding: 13px; font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 2px; transition: background 0.15s;
    }
    .discover-go-btn:hover { background: #1ed760; }
    .discover-go-btn:disabled { opacity: 0.45; cursor: default; background: var(--green); }
    .discover-clear-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem;
      padding: 13px 18px; cursor: pointer; border-radius: 2px; transition: all 0.15s;
    }
    .discover-clear-btn:hover { border-color: #444; color: var(--text); }

    /* Discover result card */
    .discover-result-card {
      display: grid; grid-template-columns: 148px 1fr;
      gap: 22px; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      padding: 18px; cursor: pointer; transition: border-color 0.15s; border-radius: 2px;
    }
    .discover-result-card:hover { border-color: #333; }
    .discover-result-card img { width: 148px; height: 148px; object-fit: cover; display: block; }
    .d-placeholder { width: 148px; height: 148px; background: var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 2.5rem; }
    .r-name { font-size: 1.1rem; font-weight: 500; margin-bottom: 6px; line-height: 1.3; }
    .r-sub { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 14px; }
    .r-sub span { color: var(--green); }
    .discover-result-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ═══════════════════════════════════════════
       SHARED: section headers, album rows, detail
    ═══════════════════════════════════════════ */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .section-title { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .section-count { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--muted); }
    .album-list { margin-bottom: 48px; }
    .album-row { display: grid; grid-template-columns: 24px 48px 1fr auto; align-items: center; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
    .album-row:hover { background: var(--surface); margin: 0 -12px; padding: 10px 12px; }
    .album-index { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--muted); text-align: right; }
    .album-thumb { width: 48px; height: 48px; object-fit: cover; display: block; background: var(--border); }
    .album-thumb-placeholder { width: 48px; height: 48px; background: var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 1.2rem; }
    .album-info { min-width: 0; }
    .album-name { font-size: 0.9rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .album-sub { font-size: 0.78rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .album-sub span { color: var(--green); font-size: 0.72rem; }
    .album-actions { display: flex; align-items: center; gap: 6px; }
    .action-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 0.72rem; font-family: 'IBM Plex Mono', monospace; padding: 4px 10px; cursor: pointer; border-radius: 2px; transition: all 0.15s; white-space: nowrap; }
    .action-btn:hover { border-color: var(--green-dim); color: var(--green); }
    .action-btn.saved { border-color: var(--green-dim); color: var(--green); background: rgba(29,185,84,0.06); }

    /* ── Detail ── */
    .detail-inner { max-width: 900px; margin: 0 auto; padding: 40px 28px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--muted); cursor: pointer; margin-bottom: 28px; transition: color 0.15s; background: none; border: none; padding: 0; }
    .back-btn:hover { color: var(--text); }
    .detail-header { display: flex; gap: 24px; margin-bottom: 36px; align-items: flex-start; }
    .detail-art { width: 160px; height: 160px; object-fit: cover; flex-shrink: 0; }
    .detail-art-placeholder { width: 160px; height: 160px; background: var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 3rem; flex-shrink: 0; }
    .detail-meta { flex: 1; min-width: 0; padding-top: 4px; }
    .detail-name { font-size: 1.4rem; font-weight: 500; line-height: 1.2; margin-bottom: 6px; }
    .detail-artist { font-size: 0.9rem; color: var(--green); margin-bottom: 4px; }
    .detail-info { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-bottom: 20px; }
    .detail-save-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 0.72rem; font-family: 'IBM Plex Mono', monospace; padding: 7px 14px; cursor: pointer; border-radius: 2px; transition: all 0.15s; }
    .detail-save-btn:hover { border-color: var(--green-dim); color: var(--green); }
    .detail-save-btn.saved { border-color: var(--green-dim); color: var(--green); background: rgba(29,185,84,0.06); }

    /* Genre tags */
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
    .tag {
      font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem;
      letter-spacing: 0.05em; color: var(--text-dim);
      border: 1px solid var(--border); padding: 3px 9px; border-radius: 2px;
      cursor: default; transition: color 0.15s, border-color 0.15s;
    }
    .tag:hover { color: var(--green); border-color: var(--green-dim); }
    .track-row { display: grid; grid-template-columns: 28px 1fr auto; align-items: center; gap: 14px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .track-row:last-child { border-bottom: none; }
    .track-num { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--muted); text-align: right; }
    .track-name { color: var(--text); }
    .track-dur { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--muted); }
    .similar-section { margin-top: 48px; margin-bottom: 48px; }

    /* ── My List ── */
    .list-inner { max-width: 900px; margin: 0 auto; padding: 40px 28px; }

    /* ── Misc ── */
    .status { font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; color: var(--muted); padding: 40px 0; text-align: center; }
    .status.error { color: #e05555; }
    .empty { padding: 40px 0; font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; color: var(--muted); text-align: center; }
  </style>
</head>
<body>

<header>
  <div class="inner">
    <div class="logo" onclick="showPage('home')">albumify</div>
    <div class="nav-links">
      <span class="active" id="nav-home"     onclick="showPage('home')">popular</span>
      <span               id="nav-discover" onclick="showPage('discover')">discover</span>
      <span               id="nav-search"   onclick="showPage('search')">search</span>
      <span               id="nav-list"     onclick="showPage('list')">my list <span id="list-badge"></span></span>
    </div>
  </div>
</header>

<!-- ══ HOME ══ -->
<div class="page active" id="page-home">
  <div class="home-inner">
    <div class="home-header">
      <span class="home-title">Popular Right Now</span>
      <span class="home-source">via last.fm global chart</span>
    </div>
    <div class="album-grid" id="popular-grid">
      <!-- skeleton placeholders while loading -->
      <div class="skeleton-card"><div class="skeleton skeleton-art"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-sm"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-art"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-sm"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-art"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-sm"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-art"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-sm"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-art"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-sm"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-art"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-sm"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-art"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-sm"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-art"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-sm"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-art"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-sm"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-art"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-sm"></div></div>
    </div>
  </div>
</div>

<!-- ══ DISCOVER ══ -->
<div class="page" id="page-discover">
  <div class="discover-inner">
    <div class="discover-heading">Discover</div>
    <p class="discover-desc">Pick a genre to get a random album from that world, or leave it blank and let us surprise you entirely.</p>
    <div class="genre-label">Genre — optional</div>
    <div class="genre-grid" id="genre-grid"></div>
    <div class="discover-actions">
      <button class="discover-go-btn" id="discover-go-btn" onclick="discoverRandom()">Random album →</button>
      <button class="discover-clear-btn" onclick="clearGenre()">Clear</button>
    </div>
    <div id="discover-result"></div>
  </div>
</div>

<!-- ══ SEARCH ══ -->
<div class="page" id="page-search">
  <div class="search-inner">
    <div class="search-row">
      <input class="search-input" id="search-input" type="text" placeholder="Search for an album or artist…" autocomplete="off" />
      <button class="search-btn" onclick="doSearch()">SEARCH</button>
    </div>
    <div id="search-results"></div>
  </div>
</div>

<!-- ══ MY LIST ══ -->
<div class="page" id="page-list">
  <div class="list-inner">
    <div id="my-list-content"></div>
  </div>
</div>

<!-- ══ DETAIL ══ -->
<div class="page" id="page-detail">
  <div class="detail-inner">
    <button class="back-btn" id="back-btn">← back</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
  let myList = JSON.parse(localStorage.getItem('albumify-list') || '[]');
  let albumStore = {};
  let selectedGenre = null;
  let prevPage = 'home';

  const GENRES = [
    'rock','indie','alternative','pop','hip hop','r&b',
    'jazz','electronic','ambient','metal','punk','folk',
    'classical','blues','reggae','soul','funk','country',
    'latin','experimental',
  ];

  // ── Init ─────────────────────────────────────────────────────────────────────
  function init() {
    updateBadge();
    buildGenreGrid();
    loadPopular();
    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
  }

  // ── Navigation ───────────────────────────────────────────────────────────────
  const PAGES = ['home','discover','search','list','detail'];
  function showPage(page) {
    PAGES.forEach(p => {
      document.getElementById('page-' + p).classList.toggle('active', p === page);
      const nav = document.getElementById('nav-' + p);
      if (nav) nav.classList.toggle('active', p === page);
    });
    if (page === 'list') renderMyList();
    if (page !== 'detail') prevPage = page;
    window.scrollTo(0, 0);
  }

  // ── Popular grid ─────────────────────────────────────────────────────────────
  async function loadPopular() {
    const grid = document.getElementById('popular-grid');
    try {
      const res = await fetch('/api/new-releases');
      if (!res.ok) throw new Error();
      const albums = await res.json();
      if (!albums.length) throw new Error();
      albums.forEach(a => albumStore[a.id] = a);
      grid.innerHTML = albums.map(albumCard).join('');
    } catch {
      grid.innerHTML = '<div class="status error" style="grid-column:1/-1">Could not load popular albums.</div>';
    }
  }

  function albumCard(album) {
    const saved = isInList(album.id);
    const art = album.image
      ? `<img src="${esc(album.image)}" alt="" loading="lazy" />`
      : `<div class="card-art-placeholder">♪</div>`;
    return `
      <div class="album-card" data-id="${album.id}">
        <div class="card-art-wrap">
          ${art}
          <div class="card-overlay"></div>
          <button class="card-save ${saved ? 'saved' : ''}" data-action="save" data-id="${album.id}">
            ${saved ? 'saved' : '+ list'}
          </button>
        </div>
        <div class="card-info">
          <div class="card-name">${esc(album.name)}</div>
          <div class="card-artist">${esc(album.artist)}</div>
          <div class="card-year">${album.year}</div>
        </div>
      </div>
    `;
  }

  // ── Genre grid ───────────────────────────────────────────────────────────────
  function buildGenreGrid() {
    document.getElementById('genre-grid').innerHTML = GENRES.map(g =>
      `<button class="genre-btn" data-genre="${g}" onclick="selectGenre('${g}')">${g}</button>`
    ).join('');
  }

  function selectGenre(genre) {
    selectedGenre = selectedGenre === genre ? null : genre;
    document.querySelectorAll('.genre-btn').forEach(b =>
      b.classList.toggle('selected', b.dataset.genre === selectedGenre)
    );
  }

  function clearGenre() {
    selectedGenre = null;
    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('discover-result').innerHTML = '';
  }

  // ── Discover random ──────────────────────────────────────────────────────────
  async function discoverRandom() {
    const btn = document.getElementById('discover-go-btn');
    const resultEl = document.getElementById('discover-result');
    btn.disabled = true;
    btn.textContent = 'Loading…';
    resultEl.innerHTML = '<div class="status">Finding something…</div>';

    try {
      const url = selectedGenre
        ? `/api/random-album?genre=${encodeURIComponent(selectedGenre)}`
        : '/api/random-album';
      const res = await fetch(url);
      if (!res.ok) throw new Error();
      const album = await res.json();
      albumStore[album.id] = album;

      const saved = isInList(album.id);
      const art = album.image
        ? `<img src="${esc(album.image)}" alt="" />`
        : `<div class="d-placeholder">♪</div>`;
      const genreTag = selectedGenre ? ` &nbsp;·&nbsp; <span>${selectedGenre}</span>` : '';

      resultEl.innerHTML = `
        <div class="discover-result-card" data-id="${album.id}">
          ${art}
          <div class="discover-result-info">
            <div class="r-name">${esc(album.name)}</div>
            <div class="r-sub">${esc(album.artist)} &nbsp;·&nbsp; <span>${album.year}</span>${genreTag} &nbsp;·&nbsp; ${album.totalTracks} tracks</div>
            <div class="discover-result-actions">
              <button class="action-btn ${saved ? 'saved' : ''}" data-action="save" data-id="${album.id}">
                ${saved ? 'saved' : '+ list'}
              </button>
              <button class="action-btn" onclick="discoverRandom()">try another →</button>
            </div>
          </div>
        </div>
      `;
    } catch {
      resultEl.innerHTML = '<div class="status error">Couldn\'t find an album. Try again.</div>';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Random album →';
    }
  }

  // ── Search ───────────────────────────────────────────────────────────────────
  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    showPage('search');
    const results = document.getElementById('search-results');
    results.innerHTML = '<div class="status">Searching…</div>';
    try {
      const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
      if (!res.ok) throw new Error();
      const albums = await res.json();
      albums.forEach(a => albumStore[a.id] = a);
      renderAlbumList(results, albums, `Results for "${q}"`);
    } catch {
      results.innerHTML = '<div class="status error">Search failed.</div>';
    }
  }

  // ── Album list (compact rows) ─────────────────────────────────────────────────
  function renderAlbumList(container, albums, label) {
    if (!albums.length) { container.innerHTML = '<div class="status">No albums found.</div>'; return; }
    container.innerHTML = `
      <div class="section-header">
        <span class="section-title">${label}</span>
        <span class="section-count">${albums.length} albums</span>
      </div>
      <div class="album-list">
        ${albums.map((a, i) => albumRow(a, i + 1)).join('')}
      </div>
    `;
  }

  function albumRow(album, index) {
    const saved = isInList(album.id);
    const thumb = album.image
      ? `<img class="album-thumb" src="${esc(album.image)}" alt="" loading="lazy" />`
      : `<div class="album-thumb-placeholder">♪</div>`;
    return `
      <div class="album-row" data-id="${album.id}">
        <span class="album-index">${index}</span>
        ${thumb}
        <div class="album-info">
          <div class="album-name">${esc(album.name)}</div>
          <div class="album-sub">${esc(album.artist)} &nbsp;·&nbsp; <span>${album.year}</span> &nbsp;·&nbsp; ${album.totalTracks} tracks</div>
        </div>
        <div class="album-actions">
          <button class="action-btn ${saved ? 'saved' : ''}" data-action="save" data-id="${album.id}">
            ${saved ? 'saved' : '+ list'}
          </button>
        </div>
      </div>
    `;
  }

  // ── Click delegation ──────────────────────────────────────────────────────────
  document.addEventListener('click', function(e) {
    const saveBtn = e.target.closest('[data-action="save"]');
    if (saveBtn) {
      e.stopPropagation();
      const id = saveBtn.dataset.id;
      const album = albumStore[id] || myList.find(a => a.id === id);
      if (album) toggleSave(album);
      return;
    }
    const card = e.target.closest('.album-card');
    if (card) { const a = albumStore[card.dataset.id]; if (a) openDetail(a); return; }
    const row = e.target.closest('.album-row');
    if (row) { const a = albumStore[row.dataset.id] || myList.find(x => x.id === row.dataset.id); if (a) openDetail(a); return; }
    const dCard = e.target.closest('.discover-result-card');
    if (dCard && !e.target.closest('button')) { const a = albumStore[dCard.dataset.id]; if (a) openDetail(a); }
  });

  // ── Detail page ───────────────────────────────────────────────────────────────
  async function openDetail(album) {
    document.getElementById('back-btn').onclick = () => showPage(prevPage);
    showPage('detail');
    const container = document.getElementById('detail-content');
    const saved = isInList(album.id);
    const thumb = album.image
      ? `<img class="detail-art" src="${esc(album.image)}" alt="" />`
      : `<div class="detail-art-placeholder">♪</div>`;

    container.innerHTML = `
      <div class="detail-header">
        ${thumb}
        <div class="detail-meta">
          <div class="detail-name">${esc(album.name)}</div>
          <div class="detail-artist">${esc(album.artist)}</div>
          <div class="detail-info">${album.year} &nbsp;·&nbsp; ${album.totalTracks} tracks</div>
          <button class="detail-save-btn ${saved ? 'saved' : ''}" id="detail-save-btn">
            ${saved ? 'saved' : '+ add to list'}
          </button>
        </div>
      </div>
      <div class="section-header"><span class="section-title">Tracklist</span></div>
      <div id="tracklist"><div class="status">Loading tracks…</div></div>
      <div class="similar-section">
        <div class="section-header"><span class="section-title">Similar Albums</span></div>
        <div id="similar-list"><div class="status">Loading…</div></div>
      </div>
    `;

    document.getElementById('detail-save-btn').addEventListener('click', () => {
      toggleSave(album);
      const btn = document.getElementById('detail-save-btn');
      btn.textContent = isInList(album.id) ? 'saved' : '+ add to list';
      btn.classList.toggle('saved', isInList(album.id));
    });

    try {
      const res = await fetch(`/api/album/${album.id}`);
      if (!res.ok) throw new Error();
      const detail = await res.json();
      album.artistId = detail.artistId;
      albumStore[album.id] = album;
      if (detail.tags?.length) {
        const tagHtml = `<div class="tag-list">${detail.tags.map(t => `<span class="tag">${esc(t)}</span>`).join("")}</div>`;
        document.getElementById("detail-save-btn").insertAdjacentHTML("afterend", tagHtml);
      }
      document.getElementById('tracklist').innerHTML = detail.tracks.map(t => `
        <div class="track-row">
          <span class="track-num">${t.track_number}</span>
          <span class="track-name">${esc(t.name)}</span>
          <span class="track-dur">${msToMin(t.duration_ms)}</span>
        </div>
      `).join('');
    } catch {
      document.getElementById('tracklist').innerHTML = '<div class="status error">Could not load tracks.</div>';
    }

    const similarList = document.getElementById('similar-list');
    try {
      const res = await fetch(`/api/similar/${album.id}`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      data.forEach(a => albumStore[a.id] = a);
      similarList.innerHTML = data.length
        ? `<div class="album-list">${data.map((a, i) => albumRow(a, i + 1)).join('')}</div>`
        : '<div class="status">No similar albums found.</div>';
    } catch {
      similarList.innerHTML = '<div class="status error">Could not load similar albums.</div>';
    }
  }

  // ── Save / list ───────────────────────────────────────────────────────────────
  function toggleSave(album) {
    if (isInList(album.id)) {
      myList = myList.filter(a => a.id !== album.id);
    } else {
      myList.push(album);
    }
    saveList();
    document.querySelectorAll(`[data-action="save"][data-id="${album.id}"]`).forEach(btn => {
      const s = isInList(album.id);
      btn.textContent = s ? 'saved' : '+ list';
      btn.classList.toggle('saved', s);
    });
  }

  function renderMyList() {
    const container = document.getElementById('my-list-content');
    myList.forEach(a => albumStore[a.id] = a);
    if (!myList.length) {
      container.innerHTML = '<div class="empty">Your list is empty. Search for albums and save them here.</div>';
      return;
    }
    renderAlbumList(container, myList, 'My List');
  }

  function isInList(id) { return myList.some(a => a.id === id); }
  function saveList() { localStorage.setItem('albumify-list', JSON.stringify(myList)); updateBadge(); }
  function updateBadge() {
    document.getElementById('list-badge').textContent = myList.length ? `(${myList.length})` : '';
  }
  function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function msToMin(ms) { const s = Math.floor(ms/1000); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

  init();
</script>
</body>
</html>
